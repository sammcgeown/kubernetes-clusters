apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  ignoreDifferences:
    - group: helm.toolkit.fluxcd.io
      kind: HelmRelease
      jsonPointers:
        - /metadata/finalizers
    - group: source.toolkit.fluxcd.io
      kind: HelmRepository
      jsonPointers:
        - /metadata/finalizers
  project: default
  source:
    repoURL: https://github.com/sammcgeown/kubernetes-clusters.git
    targetRevision: main
    path: vault/overlays/dell7040
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    syncOptions:
      - ServerSideApply=true