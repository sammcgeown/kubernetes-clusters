apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rpi4-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sammcgeown/kubernetes-clusters.git
    targetRevision: main
    path: apps/rpi4
  destination:
    server: https://192.168.1.204:6443
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
