apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rpi4-gateway-api
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  source:
    repoURL: https://github.com/sammcgeown/kubernetes-clusters.git
    targetRevision: main
    path: gateway-api/overlays/rpi4
  destination:
    server: https://192.168.1.204:6443
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
