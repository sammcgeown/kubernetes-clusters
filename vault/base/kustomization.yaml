apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - vault-gateway.yaml
  - vault-httproute.yaml
helmCharts:
  - name: vault
    version: 0.32.0
    releaseName: vault
    repo: https://helm.releases.hashicorp.com
    valuesFile: values.yaml
    namespace: vault
  - name: vault-secrets-operator
    version: 1.4.0
    releaseName: vault-secrets-operator
    repo: https://helm.releases.hashicorp.com
    namespace: vault
    valuesInline:
      csi:
        enabled: true
